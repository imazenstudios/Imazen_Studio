<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="apple-touch-icon" href="/images/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imazen Studios | Largest Premium Photography Studio in Srikakulam</title>
    <meta name="description" content="Capture your most beautiful memories with Imazen Studios. We specialize in premium Maternity, Newborn, Baby, and Family cinematic photography in Srikakulam, Vizag, and Vizianagaram." />
    
    <!-- Google Fonts for Wox Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Raleway:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Google Analytics placeholder -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <!-- Meta Pixel Code placeholder -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', 'XXXXXXXXXXXXXXXX');
      fbq('track', 'PageView');
    </script>
  </head>
  <body>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=XXXXXXXXXXXXXXXX&ev=PageView&noscript=1"
    /></noscript>
    <div id="error-overlay" style="display:none; position:fixed; z-index:999999; background:red; color:white; padding:20px; inset:0; font-family:monospace; white-space:pre-wrap;"></div>
    <script>
      window.addEventListener('error', (event) => {
        const el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.textContent += event.message + '\n' + event.filename + ':' + event.lineno + ':' + event.colno + '\n' + (event.error && event.error.stack ? event.error.stack : '') + '\n\n';
      });
      window.addEventListener('unhandledrejection', (event) => {
        const el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.textContent += 'Unhandled Rejection: ' + event.reason + '\n\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
